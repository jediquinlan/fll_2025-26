<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pybricks Mosaic Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            text-align: center;
        }
        #value-display {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 20px auto;
            display: grid;
            gap: 1px;
            padding: 10px;
            border: 3px solid #ccc;
            border-radius: 10px;
            justify-content: center;
            align-content: center;
            background-color: #f0f0f0;
            max-width: 95%;
            overflow: auto;
        }
        .grid-cell {
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            background-color: #ddd;
            min-width: 4px;
            min-height: 4px;
        }
        button {
            font-size: 16px;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 8px;
        }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .status-disconnected { background-color: #ffebee; color: #c62828; }
        .status-connected { background-color: #e8f5e9; color: #2e7d32; }
        .status-connecting { background-color: #fff3e0; color: #ef6c00; }
        #stats {
            margin: 10px 0;
            font-weight: bold;
            font-size: 14px;
        }
        #log {
            margin-top: 20px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>Pybricks Mosaic Scanner</h1>

    <div id="status" class="status-disconnected">Disconnected</div>

    <button id="connectBtn">Connect to Hub</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <button id="clearBtn">Clear Grid</button>

    <div id="stats">
        <span id="gridInfo">Grid: 0x0</span> &nbsp;|&nbsp;
        <span id="cellCount">Cells: 0</span>
    </div>

    <div id="currentPos" style="margin: 8px 0; font-weight: bold;">
        Current: --
    </div>

    <div id="value-display"></div>

    <div id="log"></div>

    <script>
        const valueDisplay = document.getElementById('value-display');
        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const clearBtn = document.getElementById('clearBtn');
        const logDiv = document.getElementById('log');
        const currentPosDiv = document.getElementById('currentPos');
        const gridInfoSpan = document.getElementById('gridInfo');
        const cellCountSpan = document.getElementById('cellCount');

        let device = null;
        let characteristic = null;
        let mosaicGrid = {};
        let maxX = 0;
        let maxY = 0;
        let totalCells = 0;
        const MAX_DISPLAY_SIZE = 850;

        let byteBuffer = [];

        // Two-byte marker to avoid collision with valid 16-bit coordinates
        const MARKER1 = 0xFF;
        const MARKER2 = 0xFE;
        const PACKET_LEN = 7; // 2 marker + 2 x + 2 y + 1 color

        const PYBRICKS_SERVICE_UUID = 'c5f50001-8280-46da-89f4-6d8051e4aeef';
        const UART_RX_CHAR_UUID = 'c5f50002-8280-46da-89f4-6d8051e4aeef';

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `[${timestamp}] ${message}<br>` + logDiv.innerHTML;
            if (logDiv.children.length > 200) {
                logDiv.innerHTML = logDiv.innerHTML.split('<br>').slice(0, 100).join('<br>');
            }
        }

        function updateStatus(status, className) {
            statusDiv.textContent = status;
            statusDiv.className = className;
        }

        function clearGrid() {
            mosaicGrid = {};
            maxX = 0;
            maxY = 0;
            totalCells = 0;
            byteBuffer = [];
            rebuildGrid();
            log('Grid cleared');
        }

        function getColorInfo(colorCode) {
            const COLOR_INFO = {
                0: { name: 'None', color: '#ddd' },
                1: { name: 'Red', color: '#ff0000' },
                2: { name: 'Green', color: '#00ff00' },
                3: { name: 'Blue', color: '#0000ff' },
                4: { name: 'Yellow', color: '#ffff00' },
                5: { name: 'White', color: '#ffffff' },
                6: { name: 'Black', color: '#000000' }
            };
            return COLOR_INFO[colorCode] || { name: 'Unknown', color: '#888' };
        }

        function rebuildGrid() {
            const width = maxX + 1;
            const height = maxY + 1;

            const cellSize = Math.max(
                4,
                Math.min(
                    Math.floor(MAX_DISPLAY_SIZE / Math.max(width, height)),
                    60
                )
            );

            valueDisplay.style.gridTemplateColumns = `repeat(${width}, ${cellSize}px)`;
            valueDisplay.style.gridTemplateRows = `repeat(${height}, ${cellSize}px)`;
            valueDisplay.innerHTML = '';

            gridInfoSpan.textContent = `Grid: ${width}x${height} (${cellSize}px)`;
            cellCountSpan.textContent = `Cells: ${totalCells}`;

            for (let y = 0; y <= maxY; y++) {
                for (let x = 0; x <= maxX; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${x}-${y}`;
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;

                    const key = `${x},${y}`;
                    if (mosaicGrid[key] !== undefined) {
                        const colorInfo = getColorInfo(mosaicGrid[key]);
                        cell.style.backgroundColor = colorInfo.color;
                        cell.title = `(${x}, ${y}): ${colorInfo.name}`;
                    }

                    valueDisplay.appendChild(cell);
                }
            }
        }

        function updateCell(x, y, colorCode) {
            let needsRebuild = false;
            if (x > maxX) { maxX = x; needsRebuild = true; }
            if (y > maxY) { maxY = y; needsRebuild = true; }

            const key = `${x},${y}`;
            if (mosaicGrid[key] === undefined) totalCells++;
            mosaicGrid[key] = colorCode;

            if (needsRebuild) {
                rebuildGrid();
            } else {
                const cell = document.getElementById(`cell-${x}-${y}`);
                if (cell) {
                    const colorInfo = getColorInfo(colorCode);
                    cell.style.backgroundColor = colorInfo.color;
                    cell.title = `(${x}, ${y}): ${colorInfo.name}`;
                }
                cellCountSpan.textContent = `Cells: ${totalCells}`;
            }
        }

        function findMarker() {
            for (let i = 0; i < byteBuffer.length - 1; i++) {
                if (byteBuffer[i] === MARKER1 && byteBuffer[i + 1] === MARKER2) {
                    return i;
                }
            }
            return -1;
        }

        async function connect() {
            try {
                updateStatus('Connecting...', 'status-connecting');
                log('Requesting Bluetooth device...');

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [PYBRICKS_SERVICE_UUID] }]
                });

                log(`Selected device: ${device.name}`);

                const server = await device.gatt.connect();
                log('Connected to GATT server');

                const service = await server.getPrimaryService(PYBRICKS_SERVICE_UUID);
                log('Got Pybricks UART service');

                characteristic = await service.getCharacteristic(UART_RX_CHAR_UUID);
                log('Got UART RX characteristic');

                byteBuffer = [];

                await characteristic.startNotifications();
                log('Notifications started');

                characteristic.addEventListener('characteristicvaluechanged', handleValueChange);

                updateStatus(`Connected to ${device.name}`, 'status-connected');
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;

            } catch (error) {
                log(`Error: ${error}`);
                updateStatus('Connection failed', 'status-disconnected');
                console.error('Connection error:', error);
            }
        }

        function handleValueChange(event) {
            const value = event.target.value;
            const bytes = new Uint8Array(value.buffer);

            for (let i = 0; i < bytes.length; i++) {
                byteBuffer.push(bytes[i]);
            }

            while (byteBuffer.length > 0) {
                const markerIdx = findMarker();

                if (markerIdx === -1) {
                    // Keep the last byte in case it's the start of a marker
                    if (byteBuffer.length > 1) {
                        byteBuffer.splice(0, byteBuffer.length - 1);
                    }
                    break;
                }

                if (markerIdx > 0) {
                    byteBuffer.splice(0, markerIdx);
                }

                if (byteBuffer.length < PACKET_LEN) break;

                const x = (byteBuffer[2] << 8) | byteBuffer[3];
                const y = (byteBuffer[4] << 8) | byteBuffer[5];
                const colorCode = byteBuffer[6];

                byteBuffer.splice(0, PACKET_LEN);

                if (colorCode <= 6) {
                    updateCell(x, y, colorCode);

                    const colorName = getColorInfo(colorCode).name;
                    currentPosDiv.textContent = `Current: (${x}, ${y}) - ${colorName}`;
                    log(`Position (${x}, ${y}): ${colorName}`);
                }
            }
        }

        function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
                log('Disconnected');
            }
            updateStatus('Disconnected', 'status-disconnected');
            currentPosDiv.textContent = 'Current: --';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
        }

        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        clearBtn.addEventListener('click', clearGrid);

        rebuildGrid();

        if ('bluetooth' in navigator) {
            log('Web Bluetooth API is available');
        } else {
            log('ERROR: Web Bluetooth API not available. Use Chrome, Edge, or Opera.');
            updateStatus('Browser not supported', 'status-disconnected');
            connectBtn.disabled = true;
        }
    </script>
</body>
</html>
